version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: api-test-db
    environment:
      POSTGRES_DB: api_test_db
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    ports:
      - "5432:5432"
    volumes:
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U testuser -d api_test_db" ]
      interval: 5s
      timeout: 5s
      retries: 10